{% for item in value.attributes %}
  <tr>
    <td class="p-3 col-1" data-sort="{{ value.displayName }}">
      <div class="d-flex flex-wrap">
        <a
          href="/{{ key }}/"
          class="icon-link d-inline-flex align-items-start mb-1 me-1 text-decoration-none"
          aria-label="{{ value.displayName }}">
          <i class="fa-solid fa-{{ value.icon }} me-2" aria-hidden="true"></i>
        </a>
      </div>
    </td>
    <td class="p-3 col-4" data-sort="{{ item.displayName }}">
      <div>
        <a href="/{{ item.key | slugify }}">{{ item.displayName | escape }}</a>
      </div>
      <div>
        <span class="small">{{ item.description | escape }}</span>
      </div>
    </td>
    <td class="p-3 col-4">
      <div>
        <span class="small">{{ item.why | escape }}</span>
      </div>
    </td>
    <td class="p-3 col-3">
      <ul class="small">
        {% for guidance in item.guidance %}
          <li>
            <a href="{{ guidance.url }}">{{ guidance.displayName }}</a>
          </li>
        {% endfor %}
      </ul>
    </td>
  </tr>
{% endfor %}
