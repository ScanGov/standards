<div class="py-4{% if not noBorder %} mb-4 border-bottom{% endif %}">
  <div class="container">
    <div class="row">
      <div class="col-12">
        {% if title %}<h1 class="display-5 mb-0">{{ title | safe }}</h1>{% endif %}
        {% if showDescription %}<p class="lead fs-5 mt-2 mb-0">{{ description | safe }}</p>{% endif %}
        {% if search %}
        <div class="row mt-3 mb-0">
          <div class="col-12 col-md-6">
            {% include "search.html" %}
          </div>
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
