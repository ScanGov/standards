{% if site.gaId %}
<script async defer src="https://www.googletagmanager.com/gtag/js?id={{ site.gaId }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.gaId }}');
</script>
{% endif %}
