<ul class="nav nav-pills filter small">
  <li class="nav-item">
    <a class="nav-link btn btn-primary-outline mx-1{% if not topic %} active{% endif %}"{% if not topic %} aria-current="page"{% endif %} href="/guidance">
      <i class="fa-solid fa-circle-notch"></i>All</a>
  </li>
  {% for key, audit in audits | dictsort %}
    <li class="nav-item">
      {# topic is the pagination variable for each page #}
      <a class="nav-link btn btn-primary-outline mx-1{% if key == topic %} active{% endif %}"{% if key == topic %} aria-current="page"{% endif %} href="/guidance/{{ key }}/">
        <i class="fa-solid fa-{{ audit.icon }}" title="{{ audit.displayName }}"></i>{{ audit.displayName }}</a>
    </li>
  {% endfor %}
</ul>
